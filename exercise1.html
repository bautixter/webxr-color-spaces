<!DOCTYPE html>
<html>

    <!-- Preamble —————————————————————————————————————————————————— -->

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>Practical Work #2 - Exercise 1</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                overflow: hidden;
            }
            #c {
                width: 100%;
                height: 100%;
                display: block;
            }
        </style>
    </head>

    <body>
        <canvas id="c"></canvas>
        <input id="fileInput" type="file" accept="image/*,video/*" style="display:none">
    </body>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">

    // Three.js  code —————————————————————————————————————————————— -->

    import * as THREE from 'three';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';

    import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    import { createGui } from './javascript/vr_gui.js';
    import { colorSpaceFunctions } from './javascript/glsl_functions.js'
    import { loadFile } from './javascript/file_loader.js'

    // Variable and constants definition
    // ----------------------------------------------------------------

    const ColorMode = Object.freeze({
        RGB  : 0,
        HSV  : 1,
        XYZ  : 2,
        xyY  : 3,
        Lab  : 4,
        LCh  : 5,
    });

    const PARAMS = {
        colorMode : ColorMode.RGB,
        pointOpacity : 1.0,
        pointSize : 5.0
    };

    // Helper: Three.js hex number → CSS color string
    const hexToCSS = c => `#${c.toString(16).padStart(6, '0')}`;

    //  Color mode definitions
    const colorModeDefs = {
        [ColorMode.RGB]: {
            labels:      ['R', 'G', 'B'],
            order:       [0, 1, 2],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [1, 1, 1],
            mins:        [0, 0, 0],
            useNegative: false,
        },
        [ColorMode.HSV]: {
            labels:      ['H', 'S', 'V'],
            order:       [0, 1, 2],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [360, 1, 1],
            mins:        [0, 0, 0],
            useNegative: false,
        },
        [ColorMode.XYZ]: {
            labels:      ['X', 'Z', 'Y'],
            order:       [0, 2, 1],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [1, 1, 1],
            mins:        [0, 0, 0],
            useNegative: false,
        },
        [ColorMode.xyY]: {
            labels:      ['x', 'Y', 'y'],
            order:       [0, 2, 1],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [1, 1, 1],
            mins:        [0, 0, 0],
            useNegative: false,
        },
        [ColorMode.Lab]: {
            labels:      ['a*', 'L*', 'b*'],
            order:       [1, 0, 2],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [100, 128, 128],  // per channel: [L*, a*, b*]
            mins:        [0, -128, -128],  // L* ∈ [0,100], a*/b* ∈ [-128,128]
            useNegative: true,
        },
        [ColorMode.LCh]: {
            labels:      ['L*', 'C*', 'h'],
            order:       [0, 1, 2],
            colors:      [0xFF0000, 0x00FF00, 0x0000FF],
            limits:      [100, 150, 360],
            mins:        [0, 0, 0],
            useNegative: false,
        },
    };

    // Scene setup
    // ----------------------------------------------------------------

    // Initialize the scene
    const scene = new THREE.Scene();
    
    // Create a WebGLRenderer and enable shadow maps
    const canvas = document.querySelector('#c');
    const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
    renderer.shadowMap.enabled = true;

    // VR init
    renderer.xr.enabled = true;
    document.body.appendChild( ARButton.createButton( renderer ) );

    // CSS2D label renderer (renders HTML divs in 3D space, no canvas needed)
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // Create a perspective camera
    const camera = new THREE.PerspectiveCamera(60, 2, 0.1, 100);
    camera.position.z = 5;
    camera.position.y = 5;

    // Orbit controls
    var controls = new OrbitControls(camera, renderer.domElement);
    controls.listenToKeyEvents(window);

    // Let's also set up the scene with some lights
    scene.background = new THREE.Color( 0x333333 );
    {
        const point1 = new THREE.PointLight(0xFFFFFF, 8);
        point1.position.set(0, 3, 0);
        const point2 = new THREE.PointLight(0xFFFFFF, 5);
        point2.position.set(3, 2, 3);
        const ambient = new THREE.AmbientLight(0xFFFFFF, 0.2);

        scene.add(point1);
        scene.add(point2);
        scene.add(ambient);
    }

    // XR handling
    // ----------------------------------------------------------------

    const buffGeo = new THREE.BufferGeometry();
    buffGeo.setFromPoints( [ new THREE.Vector3( 0, 0, 0 ), new THREE.Vector3( 0, 0, - 5 ) ] );

    const controller1 = renderer.xr.getController( 0 );
    controller1.add( new THREE.Line( buffGeo ) );
    scene.add( controller1 );

    const controller2 = renderer.xr.getController( 1 );
    controller2.add( new THREE.Line( buffGeo ) );
    scene.add( controller2 );

    const controllerModelFactory = new XRControllerModelFactory();

    const controllerGrip1 = renderer.xr.getControllerGrip( 0 );
    controllerGrip1.add( controllerModelFactory.createControllerModel( controllerGrip1 ) );
    scene.add( controllerGrip1 );

    const controllerGrip2 = renderer.xr.getControllerGrip( 1 );
    controllerGrip2.add( controllerModelFactory.createControllerModel( controllerGrip2 ) );
    scene.add( controllerGrip2 );

    // Setup the grid and axes
    // ----------------------------------------------------------------

    let gridHelper = null;
    let arrows     = [];
    let gridLabels = [];

    function makeAxisLabel(text, colorHex) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.font = 'bold 44px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = colorHex;
        ctx.fillText(text, 64, 32);
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
        sprite.scale.set(0.5, 0.25, 1);
        return { sprite, canvas, ctx, tex };
    }

    const rgbDef = colorModeDefs[ColorMode.RGB];
    const axisSprites = [
        makeAxisLabel(rgbDef.labels[0], hexToCSS(rgbDef.colors[0])),
        makeAxisLabel(rgbDef.labels[1], hexToCSS(rgbDef.colors[1])),
        makeAxisLabel(rgbDef.labels[2], hexToCSS(rgbDef.colors[2])),
    ];

    function updateAxisLabels(mode) {
        const def = colorModeDefs[mode];
        axisSprites.forEach((lbl, i) => {
            lbl.ctx.clearRect(0, 0, lbl.canvas.width, lbl.canvas.height);
            lbl.ctx.fillStyle = hexToCSS(def.colors[i]);
            lbl.ctx.font = 'bold 44px monospace';
            lbl.ctx.textAlign = 'center';
            lbl.ctx.textBaseline = 'middle';
            lbl.ctx.fillText(def.labels[i], 64, 32);
            lbl.tex.needsUpdate = true;
        });
    }

    //  Add cube (no geometry size or parent yet — applyLayout handles both)
    const cubeMat = new THREE.MeshBasicMaterial({
        color: 0x555555,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.2
    });
    const cube = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), cubeMat);

    function makeLabel(text) {
        const div = document.createElement('div');
        div.style.color = '#aaaaaa';
        div.style.fontSize = '11px';
        div.style.fontFamily = 'monospace';
        div.textContent = text;
        return new CSS2DObject(div);
    }

    // Rebuilds the grid, arrows, cube and particle placement for a given mode def.
    function applyLayout(def) {
        const useNeg = def.useNegative;
        const size   = useNeg ? 6 : 3;
        const half   = size / 2;
        const divs   = useNeg ? 20 : 10;

        // Replace grid helper
        if (gridHelper) scene.remove(gridHelper);
        gridHelper = new THREE.GridHelper(size, divs, 0x888888, 0x888888);
        gridHelper.position.set(0, -1, 0);
        scene.add(gridHelper);

        // Cube
        if (useNeg){
            cube.scale.set(2,1,2);
            cube.position.set(0, half/2, 0);
        } else {
            cube.scale.set(1,1,1);
            cube.position.set(0, half, 0);
        };
        gridHelper.add(cube);

        // Particles: center at grid origin when negative axes are present
        const pOff = useNeg ? 0 : -half;
        particles.position.set(pOff, 0.001, pOff);
        gridHelper.add(particles);

        // Arrows & sprite labels
        arrows = [];
        const axLen   = (useNeg ? half : size) * 1.1;
        const headLen = axLen * 0.1;
        const headW   = headLen * 0.4;
        const tipDist = axLen + 0.3;

        const posDirs = [
            new THREE.Vector3(1, 0, 0),
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(0, 0, 1),
        ];

        if (useNeg) {
            // Axes centered at grid origin; add both positive and negative arrows
            const center = new THREE.Vector3(0, 0.001, 0);
            posDirs.forEach((dir, i) => {
                const pos = new THREE.ArrowHelper(dir, center, axLen, def.colors[i], headLen, headW);
                gridHelper.add(pos);
                arrows.push(pos);
                if (i !== 1) {  // L* (Y, i=1) has no negative direction
                    const neg = new THREE.ArrowHelper(dir.clone().negate(), center, axLen, def.colors[i], headLen, headW);
                    gridHelper.add(neg);
                    arrows.push(neg);
                }
            });

            // Labels at tips of positive arrows only
            axisSprites[0].sprite.position.set(tipDist, 0.001,    0       );
            axisSprites[1].sprite.position.set(0,        tipDist,  0       );
            axisSprites[2].sprite.position.set(0,        0.001,    tipDist );
        } else {
            // Axes from the grid corner
            const origin = new THREE.Vector3(-half, 0.001, -half);
            posDirs.forEach((dir, i) => {
                const a = new THREE.ArrowHelper(dir, origin, axLen, def.colors[i], headLen, headW);
                gridHelper.add(a);
                arrows.push(a);
            });

            axisSprites[0].sprite.position.set(origin.x + tipDist, origin.y,             origin.z           );
            axisSprites[1].sprite.position.set(origin.x,            origin.y + tipDist,   origin.z           );
            axisSprites[2].sprite.position.set(origin.x,            origin.y,             origin.z + tipDist );
        }

        axisSprites.forEach(s => gridHelper.add(s.sprite));

        // Grid tick labels (X, Y, Z axes)
        gridLabels.forEach(lbl => lbl.element.remove());
        gridLabels = [];
        const TICKS   = 5;
        const decimals = range => range <= 2 ? 2 : 0;

        // X and Z floor labels
        [0, 2].forEach(axisIdx => {
            const ch  = def.order[axisIdx];
            const min = def.mins[ch];
            const max = def.limits[ch];
            const dec = decimals(max - min);
            for (let i = 1; i <= TICKS; i++) {
                const t   = i / TICKS;
                const pos = -half + t * size;
                const lbl = makeLabel((min + t * (max - min)).toFixed(dec));
                lbl.position.set(
                    axisIdx === 0 ? pos        : -half - 0.3,
                    0.001,
                    axisIdx === 0 ? half + 0.3 : pos
                );
                gridHelper.add(lbl);
                gridLabels.push(lbl);
            }
        });

        // Y axis labels (vertical)
        {
            const ch  = def.order[1];
            const min = def.mins[ch];
            const max = def.limits[ch];
            const dec = decimals(max - min);
            for (let i = 1; i <= TICKS; i++) {
                const t   = i / TICKS;
                const lbl = makeLabel((min + t * (max - min)).toFixed(dec));
                lbl.position.set(-half - 0.3, t * (useNeg ? half : size), -half);
                gridHelper.add(lbl);
                gridLabels.push(lbl);
            }
        }
    }

    // Load texture and make point cloud
    // ----------------------------------------------------------------

    // Load texture
    const texLoader = new THREE.TextureLoader();
    const texture = await texLoader.loadAsync('textures/joensuu.jpg');
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.generateMipmaps = false;

    // Build UV and position buffers for a given texture resolution
    const pointsBuffer = new THREE.BufferGeometry();

    function rebuildGeometry(width, height) {
        const total = width * height;
        const pos = new Float32Array(total * 3);
        const uvs = new Float32Array(total * 2);
        let count = 0;
        for (let x = 0; x < width; x++) {
            for (let y = 0; y < height; y++) {
                uvs[count++] = (x + 0.5) / width;
                uvs[count++] = (y + 0.5) / height;
            }
        }
        pointsBuffer.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        pointsBuffer.setAttribute('uv',       new THREE.BufferAttribute(uvs, 2));
    }

    rebuildGeometry(texture.image.width, texture.image.height);

    // Points material definition
    const pointMat = new THREE.ShaderMaterial({
        transparent: true,
        uniforms: {
          uTex:       { value: texture },
          uOpacity:   { value: PARAMS.pointOpacity },
          uPointSize: { value: PARAMS.pointSize },
          uColorMode: { value: PARAMS.colorMode },
          uAxisOrder: { value: new THREE.Vector3(...colorModeDefs[PARAMS.colorMode].order) }
        },

        vertexShader: colorSpaceFunctions + `

            uniform sampler2D uTex;
            uniform float     uOpacity;
            uniform float     uPointSize;
            uniform int       uColorMode;
            uniform vec3      uAxisOrder;  // e.g. (0,1,2) → rgb, (1,2,0) → gbr

            varying vec4 vColor;

            void main() {
                vec3 texturePoint = texture2D ( uTex, uv ).rgb;
                vec3 newColor = color_to_mode(texturePoint, uColorMode);
                vColor = vec4(texturePoint, uOpacity);

                // Remap channels to axes using uAxisOrder
                vec3 pos = vec3(
                    newColor[int(uAxisOrder.x)],
                    newColor[int(uAxisOrder.y)],
                    newColor[int(uAxisOrder.z)]
                ) * 3.0;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                gl_PointSize = uPointSize;
            }

        `,

        fragmentShader: `

            varying vec4 vColor;
            
            void main() {
                gl_FragColor = vColor;
            }
        
        `
    });

    const particles = new THREE.Points(pointsBuffer, pointMat);
    particles.frustumCulled = false;

    function applyTexture(newTex, width, height) {
        const old = pointMat.uniforms.uTex.value;
        if (old && old !== newTex) old.dispose();
        pointMat.uniforms.uTex.value = newTex;
        rebuildGeometry(width, height);
        applyLayout(colorModeDefs[PARAMS.colorMode]);
    }

    applyLayout(colorModeDefs[PARAMS.colorMode]);

    // GUI setup
    // ----------------------------------------------------------------
    const gui = createGui({ renderer, scene, camera, controls, controller1, controller2 });

    // File field
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) {
            loadFile(e.target.files[0], (tex, w, h) => applyTexture(tex, w, h));
            fileInput.value = '';
        }
    });
    gui.add({ loadFile: () => fileInput.click() }, 'loadFile').name('Load Image / Video');

    // Color mode selector field
    gui.add( PARAMS, 'colorMode', ColorMode ).onChange( () => {
        const def = colorModeDefs[PARAMS.colorMode];
        pointMat.uniforms.uColorMode.value = PARAMS.colorMode;
        pointMat.uniforms.uAxisOrder.value.set(...def.order);
        applyLayout(def);
        updateAxisLabels(PARAMS.colorMode);
    });

    // Point opacity field
    gui.add( PARAMS, 'pointOpacity', 0.0, 1.0 ).onChange( () => {
        pointMat.uniforms.uOpacity.value = PARAMS.pointOpacity;
        particles.visible = PARAMS.pointOpacity > 0;
    });

    // Point size field
    gui.add( PARAMS, 'pointSize', 1.0, 10.0 ).onChange( () => {
        pointMat.uniforms.uPointSize.value = PARAMS.pointSize;
    });

    // Animation loop setup
    // ----------------------------------------------------------------

    function resizeRendererToDisplaySize(renderer) {
        const canvas = renderer.domElement;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const needResize = canvas.width !== width || canvas.height !== height;
        if (needResize) {
            renderer.setSize(width, height, false);
            labelRenderer.setSize(width, height);
        }
        return needResize;
    }

    function animate(time) {

        if (resizeRendererToDisplaySize(renderer)) {
        const canvas = renderer.domElement;
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        }

        controls.update();

        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }

    renderer.setAnimationLoop(animate);

</script>
</html>
