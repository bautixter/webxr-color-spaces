<!DOCTYPE html>
<html>

    <!-- Preamble —————————————————————————————————————————————————— -->

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>Practical Work #2 - Exercise 1</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
            }
            #c {
                width: 100%;
                height: 100%;
                display: block;
            }
        </style>
    </head>

    <body>
        <canvas id="c"></canvas>
    </body>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">

    // Three.js  code —————————————————————————————————————————————— -->

    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';

    import { HTMLMesh } from 'three/addons/interactive/HTMLMesh.js';
    import { InteractiveGroup } from 'three/addons/interactive/InteractiveGroup.js';
    import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'three/addons/libs/stats.module.js';
    
    const PI = 3.14159265359;

    // Scene setup
    // ----------------------------------------------------------------

    // ☆ Initialize the scene
    const scene = new THREE.Scene();
    
    // ☆ Create a WebGLRenderer and enable shadow maps
    const canvas = document.querySelector('#c');
    const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
    renderer.shadowMap.enabled = true;

    // ☆ VR init
    renderer.xr.enabled = true;
    document.body.appendChild( VRButton.createButton( renderer ) );

    // ☆ Create a perspective camera
    const camera = new THREE.PerspectiveCamera(60, 2, 0.1, 100);
    camera.position.z = 5;
    camera.position.y = 5;

    // ☆ Orbit controls
    var controls = new OrbitControls(camera, renderer.domElement);
    controls.listenToKeyEvents(window);

    // ☆ Let's also set up the scene with some lights
    scene.background = new THREE.Color( 0x333333 );
    {
        const point1 = new THREE.PointLight(0xFFFFFF, 8);
        point1.position.set(0, 3, 0);
        const point2 = new THREE.PointLight(0xFFFFFF, 5);
        point2.position.set(3, 2, 3);
        const ambient = new THREE.AmbientLight(0xFFFFFF, 0.2);

        scene.add(point1);
        scene.add(point2);
        scene.add(ambient);
    }

    // XR handling
    // ----------------------------------------------------------------

    const buffGeo = new THREE.BufferGeometry();
    buffGeo.setFromPoints( [ new THREE.Vector3( 0, 0, 0 ), new THREE.Vector3( 0, 0, - 5 ) ] );

    const controller1 = renderer.xr.getController( 0 );
    controller1.add( new THREE.Line( buffGeo ) );
    scene.add( controller1 );

    const controller2 = renderer.xr.getController( 1 );
    controller2.add( new THREE.Line( buffGeo ) );
    scene.add( controller2 );

    const controllerModelFactory = new XRControllerModelFactory();

    const controllerGrip1 = renderer.xr.getControllerGrip( 0 );
    controllerGrip1.add( controllerModelFactory.createControllerModel( controllerGrip1 ) );
    scene.add( controllerGrip1 );

    const controllerGrip2 = renderer.xr.getControllerGrip( 1 );
    controllerGrip2.add( controllerModelFactory.createControllerModel( controllerGrip2 ) );
    scene.add( controllerGrip2 );

    // Variables and GUI
    // ----------------------------------------------------------------

    // ☆ Parameter definition (all variables that can be modified through GUI)
    const parameters = {
        radius: 0.6,
        tube: 0.2,
        tubularSegments: 150,
        radialSegments: 20,
        p: 2,
        q: 3,
        thickness: 0.5
    };

    function onChange() {
        // torus.geometry.dispose();
        // torus.geometry = new THREE.TorusKnotGeometry( ...Object.values( parameters ) );
    }

    // 2D GUI setup
    const gui = new GUI( { width: 300 } );
    gui.add( parameters, 'radius', 0.0, 1.0 ).onChange( onChange );
    gui.add( parameters, 'tube', 0.0, 1.0 ).onChange( onChange );
    gui.add( parameters, 'tubularSegments', 10, 150, 1 ).onChange( onChange );
    gui.add( parameters, 'radialSegments', 2, 20, 1 ).onChange( onChange );
    gui.add( parameters, 'p', 1, 10, 1 ).onChange( onChange );
    gui.add( parameters, 'q', 0, 10, 1 ).onChange( onChange );
    
    // 3D GUI setup
    const guiMesh = new HTMLMesh( gui.domElement );
    guiMesh.position.set(0,3,4.2);
    guiMesh.rotation.set(-PI/4, 0, 0);
    guiMesh.scale.setScalar( 2 );
    
    // VR interactive group
    const group = new InteractiveGroup();
    group.listenToXRControllerEvents( controller1 );
    group.listenToXRControllerEvents( controller2 );
    scene.add( group );

    // Disable orbit controls in VR, enable in normal mode
    renderer.xr.addEventListener( 'sessionstart', () => {
        controls.enabled = false;
        group.listenToPointerEvents( renderer, camera );
        group.add(guiMesh);
        gui.domElement.style.visibility = 'hidden';
    });

    renderer.xr.addEventListener( 'sessionend', () => {
        controls.enabled = true;
        gui.domElement.style.visibility = 'visible';
        group.remove(guiMesh)
    });


    // Setup the grid and axes
    // ----------------------------------------------------------------

    //  ☆ Create grid
    const gridSize = 3
    const halfGridSize = gridSize / 2
    const gridHelper = new THREE.GridHelper( 3, 10, 0x888888, 0x888888 );
    gridHelper.position.set(0,-1,0);
    scene.add( gridHelper );

    //  ☆ Add axes to the grid
    function addArrow(dir, color){
        dir.normalize();
        const origin = new THREE.Vector3(-halfGridSize, 0.001, -halfGridSize);
        const length = gridSize * 1.1;
        const hex = 0xffff00;
        const arrowLength = length * 0.1;
        const arrowWidth = arrowLength * 0.4;
        const arrowHelper = new THREE.ArrowHelper( dir, origin, length, color, arrowLength, arrowWidth );
        gridHelper.add(arrowHelper);
    }
    
    addArrow(new THREE.Vector3( 0, 1, 0), 0x0000FF);
    addArrow(new THREE.Vector3( 1, 0, 0), 0x00FF00);
    addArrow(new THREE.Vector3( 0, 0, 1), 0xFF0000);

    //  ☆ Add cube
    const boxGeom = new THREE.BoxGeometry( gridSize, gridSize, gridSize );
    const material = new THREE.MeshBasicMaterial( {
        color: 0x555555,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.2
    } );
    const cube = new THREE.Mesh( boxGeom, material );
    cube.position.set(0,halfGridSize,0);
    gridHelper.add( cube );

    // Setup the grid and axes
    // ----------------------------------------------------------------


    // Animation loop setup
    // ----------------------------------------------------------------

    function resizeRendererToDisplaySize(renderer) {
        const canvas = renderer.domElement;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const needResize = canvas.width !== width || canvas.height !== height;
        if (needResize) {
        renderer.setSize(width, height, false);
        }
        return needResize;
    }

    function animate(time) {

        if (resizeRendererToDisplaySize(renderer)) {
        const canvas = renderer.domElement;
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        }

        controls.update();

        renderer.render(scene,camera);
    }

    renderer.setAnimationLoop(animate);

</script>
</html>
