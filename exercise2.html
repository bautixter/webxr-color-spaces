<!DOCTYPE html>
<html>

    <!-- Preamble —————————————————————————————————————————————————— -->

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>Practical Work #2 - Exercise 2</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                overflow: hidden;
            }
            #c {
                width: 100%;
                height: 100%;
                display: block;
            }
        </style>
    </head>

    <body>
        <canvas id="c"></canvas>
        <input id="fileInput" type="file" accept="image/*,video/*" style="display:none">
    </body>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        
    // Variable definition
    // ----------------------------------------------------------------

    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { BoxLineGeometry } from 'three/addons/geometries/BoxLineGeometry.js';
    import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    import { loadFile } from './javascript/file_loader.js';
    import { colorSpaceFunctions } from './javascript/glsl_functions.js';
    import { createGui } from './javascript/vr_gui.js';

    
    let camera, controls, scene, renderer;
    let elevationMaterial, basicMaterial, plane, plane2;
    let currentScale = 4.0;
    let currentWidth = 1000, currentHeight = 1000;

    // Aux data
    // ----------------------------------------------------------------
    
    const ColorMode = Object.freeze({
        RGB  : 0,
        HSV  : 1,
        XYZ  : 2,
        xyY  : 3,
        Lab  : 4,
        LCh  : 5,
    });

    const colorModeDefs = {
        [ColorMode.RGB]: ['R', 'G', 'B'],
        [ColorMode.HSV]: ['H', 'S', 'V'],
        [ColorMode.XYZ]: ['X', 'Y', 'Z'],
        [ColorMode.xyY]: ['x', 'y', 'Y'],
        [ColorMode.Lab]: ['L*', 'a*', 'b*'],
        [ColorMode.LCh]: ['L*', 'C*', 'h'],
    };

    const PARAMS = {
        colorMode: ColorMode.RGB,
        scaleElevation: 0.75,
        resolution: 1.0,
        variableID: 0,
        discretization: 2,
    }

    // Scene initialization
    // ----------------------------------------------------------------

    // Three.js scene
    console.log ( THREE.REVISION );
    scene = new THREE.Scene();
    scene.background = new THREE.Color( 0xffffff );
    const sceneGroup = new THREE.Group();
    scene.add( sceneGroup );

    // Renderer init
    renderer = new THREE.WebGLRenderer( { canvas: document.getElementById('c'), antialias: true } );
    renderer.setPixelRatio( window.devicePixelRatio );
    renderer.setSize( window.innerWidth, window.innerHeight );

    // XR handling
    renderer.xr.enabled = true;
    document.body.appendChild( ARButton.createButton( renderer ) );

    // Camera init
    camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 50 );
    camera.position.set( -3, 4, 6 );

    // Light init
    var light = new THREE.DirectionalLight( 0x888888, 1, 10, 1 );
    light.position.set( 10, 7, 5 );
    scene.add( light );


    // XR handling
    // ----------------------------------------------------------------

    const buffGeo = new THREE.BufferGeometry();
    buffGeo.setFromPoints( [ new THREE.Vector3( 0, 0, 0 ), new THREE.Vector3( 0, 0, - 5 ) ] );

    const controller1 = renderer.xr.getController( 0 );
    controller1.add( new THREE.Line( buffGeo ) );
    scene.add( controller1 );

    const controller2 = renderer.xr.getController( 1 );
    controller2.add( new THREE.Line( buffGeo ) );
    scene.add( controller2 );

    const controllerModelFactory = new XRControllerModelFactory();

    const controllerGrip1 = renderer.xr.getControllerGrip( 0 );
    controllerGrip1.add( controllerModelFactory.createControllerModel( controllerGrip1 ) );
    scene.add( controllerGrip1 );

    const controllerGrip2 = renderer.xr.getControllerGrip( 1 );
    controllerGrip2.add( controllerModelFactory.createControllerModel( controllerGrip2 ) );
    scene.add( controllerGrip2 );

    // Elevation plane definition
    // ----------------------------------------------------------------
    
    // Default texture
    const texLoader = new THREE.TextureLoader();
    let texture = await texLoader.loadAsync('textures/joensuu.jpg');
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;
    texture.generateMipmaps = false;

    // Elevation material definition
    const scaleElevation = 0.75;
    elevationMaterial = new THREE.ShaderMaterial( {
        uniforms: {
            uTex:              { value: texture },
            uColorMode:        { value: PARAMS.colorMode },
            uScaleElevation:   { value: PARAMS.scaleElevation },
            uSelectedVariable: { value: PARAMS.variableID },
        },
        vertexShader: colorSpaceFunctions + `
            varying vec2 vUv;
            
            uniform sampler2D uTex;
            uniform int       uColorMode;
            uniform float     uScaleElevation;
            uniform int       uSelectedVariable;

            float getChannel(vec3 color, int channel) {
                if (channel == 0) return color.r;
                if (channel == 1) return color.g;
                return color.b;
            }

            void main() {
                vUv = uv;

                vec3 texturePoint = texture2D ( uTex, uv ).rgb;
                vec3 newColor = color_to_mode(texturePoint, uColorMode);
                float l = getChannel(newColor, uSelectedVariable);

                vec3 newPos = position;
                newPos.z = newPos.z + l * uScaleElevation;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `,
        fragmentShader: `
            varying vec2 vUv;
            uniform sampler2D uTex;

            void main() {
                vec3 color = texture2D( uTex, vUv ).rgb;
                gl_FragColor = vec4(color, 1.0);
            }
        `
    } );
    elevationMaterial.side = THREE.DoubleSide;

    // Plane update function
    basicMaterial = new THREE.MeshBasicMaterial( { side: THREE.DoubleSide } );
    function buildPlanes(tex, width, height) {
        texture = tex;
        currentWidth = width;
        currentHeight = height;
        const factor = height / width;
        const geo = new THREE.PlaneGeometry(
            currentScale, currentScale * factor,
            Math.floor(width  / PARAMS.discretization),
            Math.floor(height / PARAMS.discretization)
        );
        
        if (plane)  { sceneGroup.remove(plane);  plane.geometry.dispose(); }
        if (plane2) { sceneGroup.remove(plane2); plane2.geometry.dispose(); }

        // Map textures
        elevationMaterial.uniforms.uTex.value = tex;
        basicMaterial.map = tex;
        basicMaterial.needsUpdate = true;

        // Elevation plane
        plane = new THREE.Mesh(geo, elevationMaterial);
        plane.position.y = 0;
        plane.rotation.set(-Math.PI/2, 0, 0);
        sceneGroup.add(plane);

        // Base plane
        plane2 = new THREE.Mesh(geo, basicMaterial);
        plane2.position.y = -0.8;
        plane2.rotation.set(-Math.PI/2, 0, 0);
        sceneGroup.add(plane2);
    }

    buildPlanes(texture,1000,1000);

    // Controls setup (must be before createGui so the reference is valid in XR handlers)
    // ----------------------------------------------------------------
    controls = new OrbitControls( camera, renderer.domElement );
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = true;
    controls.minDistance = 1;
    controls.maxDistance = 50;

    // GUI setup
    // ----------------------------------------------------------------
    const gui = createGui({ renderer, scene, camera, controls, controller1, controller2 }, { contentGroup: sceneGroup });

    // File field
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) {
            loadFile(e.target.files[0], (tex, w, h) => buildPlanes(tex, w, h));
            fileInput.value = '';
        }
    });
    gui.add({ loadFile: () => fileInput.click() }, 'loadFile').name('Load Image / Video');

    // Color settings
    const colorFolder = gui.addFolder("Color Mode Settings");

    // Color mode selector
    let colorModeSelector = colorFolder.add(PARAMS, 'colorMode', 0, 5, 1);
    colorModeSelector.name("Color Mode").name("Color Mode: RGB");
    
    // Specific variable selector
    let variableSelector = colorFolder.add(PARAMS, 'variableID', 0, 2, 1);
    variableSelector.name("Coordinate: R");
    let updateVariable = (v) => {
        // Update elevation shader
        elevationMaterial.uniforms.uSelectedVariable.value = v;
        basicMaterial.needsUpdate = true;
        variableSelector.name("Coordinate: " + colorModeDefs[PARAMS.colorMode][v])
    };
    variableSelector.onChange(updateVariable);

    colorModeSelector.onChange((v) => {
        // Update variable selector
        variableSelector.destroy();
        PARAMS.variableID = 0;
        variableSelector = colorFolder.add(PARAMS, 'variableID', 0, 2, 1);
        variableSelector.onChange(updateVariable);
        variableSelector.name("Coordinate: " + colorModeDefs[v][0]);

        // Update elevation shader
        elevationMaterial.uniforms.uColorMode.value = v;
        elevationMaterial.uniforms.uSelectedVariable.value = 0;
        basicMaterial.needsUpdate = true;  
        
        colorModeSelector.name("Color Mode: " + Object.keys(ColorMode).find(k => ColorMode[k] == v));
    });

    gui.add(PARAMS, 'discretization', 1, 10, 1).onChange(() => buildPlanes(texture, currentWidth, currentHeight));
    gui.add(PARAMS, 'scaleElevation', 0, 1).onChange((v) => {
        elevationMaterial.uniforms.uScaleElevation.value = v;
        elevationMaterial.needsUpdate = true;
    })
    // Animation loop
    // ----------------------------------------------------------------

    window.addEventListener( 'resize', onWindowResize, false );
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize( window.innerWidth, window.innerHeight );
    }

    function render() {
        controls.update();
        renderer.render( scene, camera );
    }

    renderer.setAnimationLoop( render );

    </script>

	</body>
</html>
